workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: backbone_app
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - backbone_app/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - rowaid@novaskystories.com
        notify:
          success: true
          failure: true

  web-release:
    name: Web Release
    max_build_duration: 30
    environment:
      flutter: stable
    working_directory: backbone_app
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build Web
        script: flutter build web --release
    artifacts:
      - backbone_app/build/web.zip
    publishing:
      email:
        recipients:
          - rowaid@novaskystories.com
        notify:
          success: true
          failure: true
