workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rowaidx.backbone
    working_directory: backbone_app
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - backbone_app/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - rowaid@novaskystories.com
        notify:
          success: true
          failure: true
