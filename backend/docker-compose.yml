version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backbone
      POSTGRES_USER: backbone
      POSTGRES_PASSWORD: backbone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://backbone:backbone@db:5432/backbone
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A backbone worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://backbone:backbone@db:5432/backbone
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A backbone beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://backbone:backbone@db:5432/backbone
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
