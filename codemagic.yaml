workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rowaidx.backbone
    working_directory: backbone_app
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: Backbone
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
      email:
        recipients:
          - rowaid@novaskystories.com
        notify:
          success: true
          failure: true
